# Production stack for the Hostinger VPS.
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates HTTPS for api.<your-domain> and proxies to the API.
# Postgres/Redis/Qdrant are NOT exposed publicly — only reachable inside the
# Docker network. Data persists in named volumes.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acp}
      POSTGRES_DB: ${POSTGRES_DB:-acp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acp}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-acp}:${POSTGRES_PASSWORD:-acp}@postgres:5432/${POSTGRES_DB:-acp}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    command: arq app.workers.tasks.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-acp}:${POSTGRES_PASSWORD:-acp}@postgres:5432/${POSTGRES_DB:-acp}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENV: production
    depends_on:
      - api
      - redis
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrant_storage:
  caddy_data:
  caddy_config:
