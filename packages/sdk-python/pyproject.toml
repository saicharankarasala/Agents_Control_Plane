[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-control-plane"
version = "0.1.0"
description = "Observability, evaluation, and governance SDK for AI agents"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Agent Control Plane" }]
keywords = ["llm", "agents", "observability", "tracing", "evaluation", "governance"]
dependencies = ["httpx>=0.24"]

[project.optional-dependencies]
langchain = ["langchain-core>=0.2"]
dev = ["pytest>=8"]

[project.urls]
Homepage = "https://github.com/yourname/agent-control-plane"

[tool.setuptools.packages.find]
include = ["acp*"]
